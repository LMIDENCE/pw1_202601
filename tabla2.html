<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Emisión de Canciones</title>
</head>
<body>
    <h1>Registro de Emisión de Canciones (Agrupado por Género)</h1>
    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>Género</th>
                <th>Nombre</th>
                <th>Autor o Grupo</th>
                <th>Frecuencia de Reproducción</th>
            </tr>
        </thead>
        <tbody>
            <!-- Grupo: Rock -->
            <tr>
                <td rowspan="2">Rock</td>
                <td>Stairway to Heaven</td>
                <td>Led Zeppelin</td>
                <td>1000</td>
            </tr>
            <tr>
                <td>Bohemian Rhapsody</td>
                <td>Queen</td>
                <td>800</td>
            </tr>
            <!-- Grupo: Pop -->
            <tr>
                <td rowspan="2">Pop</td>
                <td>Billie Jean</td>
                <td>Michael Jackson</td>
                <td>1200</td>
            </tr>
            <tr>
                <td>Shape of You</td>
                <td>Ed Sheeran</td>
                <td>950</td>
            </tr>
            <!-- Grupo: Jazz -->
            <tr>
                <td rowspan="1">Jazz</td>
                <td>What a Wonderful World</td>
                <td>Louis Armstrong</td>
                <td>600</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
